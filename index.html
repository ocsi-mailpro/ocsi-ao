<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AOFinder — Appels d'Offres IT en temps réel</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;lay=swap
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #000; --surface: rgba(255,255,255,0.03);
  --surface-hover: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.06);
  --text: #f5f5f7; --text2: #a1a1a6; --text3: #6e6e73;
  --accent: #0071e3; --success: #30d158;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.5;
  -webkit-font-smoothing: antialiased; overflow-x: hidden;
}
.bg-gradient {
  position: fixed; top: -50%; left: -50%; right: -50%; bottom: -50%;
  width: 200%; height: 200vh;
  background:
    radial-gradient(circle at 50% 50%, rgba(0,113,227,0.08) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(48,209,88,0.06) 0%, transparent 40%);
  animation: gradientShift 20s ease infinite; z-index: 0; pointer-events: none;
}
@keyframes gradientShift { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(-10%, -10%); } }
.container { max-width: 1400px; margin: 0 auto; padding: 0 40px; position: relative; z-index: 1; }
.hero { text-align: center; padding: 120px 40px 80px; }
.hero h1 {
  font-size: 72px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 16px;
  background: linear-gradient(135deg, #f5f5f7 0%, #a1a1a6 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: fadeIn 0.8s ease;
}
.hero p { font-size: 24px; color: var(--text2); font-weight: 400; margin-bottom: 12px; animation: fadeIn 0.8s ease 0.1s both; }
.sources-badge {
  display: inline-flex; align-items: center; gap: 12px; padding: 8px 20px;
  background: var(--surface); border: 1px solid var(--border); border-radius: 100px;
  font-size: 14px; color: var(--text3); backdrop-filter: blur(40px); animation: fadeIn 0.8s ease 0.2s both;
}
.live { width: 8px; height: 8px; background: var(--success); border-radius: 50%; box-shadow: 0 0 12px var(--success); animation: pulse 2s ease infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
.filters {
  background: var(--surface); backdrop-filter: blur(40px); border: 1px solid var(--border);
  border-radius: 24px; padding: 24px 24px 16px; margin-bottom: 28px; animation: fadeIn 0.8s ease 0.3s both;
}
.filter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; margin-bottom: 16px; }
.filter-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 8px; }
input, select {
  width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 12px;
  color: var(--text); padding: 12px 14px; font-family: inherit; font-size: 15px; transition: all 0.2s;
}
input:focus, select:focus { outline: none; background: rgba(0,0,0,0.6); border-color: var(--accent); box-shadow: 0 0 0 4px rgba(0,113,227,0.1); }
input::placeholder { color: var(--text3); }
input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { display: none; }
select option { background: #1a1a1a; color: var(--text); padding: 10px; }
.controls { display: flex; gap: 10px; flex-wrap: wrap; }
.btn {
  padding: 12px 18px; border-radius: 12px; font-size: 14px; font-weight: 600; border: none; cursor: pointer;
  transition: all 0.2s; font-family: inherit; background: var(--surface); color: var(--text); border: 1px solid var(--border);
}
.btn:hover { background: var(--surface-hover); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-primary { background: var(--accent); color: white; border-color: rgba(0,0,0,0); }
.btn-primary:hover { background: #0077ed; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 28px; animation: fadeIn 0.8s ease 0.4s both; }
.stat-card {
  background: var(--surface); backdrop-filter: blur(40px); border: 1px solid var(--border);
  border-radius: 20px; padding: 24px; transition: all 0.3s; position: relative; overflow: hidden;
}
.stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--accent), var(--success)); opacity: 0; transition: opacity 0.3s; }
.stat-card:hover { transform: translateY(-6px); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
.stat-card:hover::before { opacity: 1; }
.stat-value {
  font-size: 40px; font-weight: 700; background: linear-gradient(135deg, var(--text), var(--text2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 6px; letter-spacing: -0.02em; font-variant-numeric: tabular-nums;
}
.stat-label { font-size: 13px; color: var(--text2); font-weight: 500; }
.ao-list { display: grid; gap: 20px; }
.ao-card {
  background: var(--surface); backdrop-filter: blur(40px); border: 1px solid var(--border); border-radius: 20px; padding: 20px;
  transition: all 0.25s; position: relative; overflow: hidden;
}
.ao-card::after { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: linear-gradient(180deg, var(--accent), var(--success)); opacity: 0; transition: opacity 0.2s; }
.ao-card:hover { transform: translateX(6px) translateY(-2px); box-shadow: 0 24px 48px rgba(0,0,0,0.5); }
.ao-card:hover::after { opacity: 1; }
.ao-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; gap: 16px; }
.ao-title { font-size: 20px; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 6px; line-height: 1.3; }
.ao-client { color: var(--text2); font-size: 14px; display: flex; align-items: center; gap: 6px; }
.badge {
  padding: 6px 12px; border-radius: 100px; font-size: 12px; font-weight: 600; white-space: nowrap;
  background: linear-gradient(135deg, rgba(0,113,227,0.15), rgba(48,209,88,0.15)); color: var(--accent); border: 1px solid rgba(0,113,227,0.3);
}
.ao-meta {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; padding: 14px; background: rgba(0,0,0,0.3); border-radius: 16px; margin-bottom: 12px;
}
.meta-item { display: flex; flex-direction: column; gap: 2px; }
.meta-label { font-size: 11px; color: var(--text3); font-weight: 600; letter-spacing: 0.06em; }
.meta-value { font-size: 15px; font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; }
.ao-desc { color: var(--text2); line-height: 1.6; margin-bottom: 14px; font-size: 14px; }
.ao-link { display: inline-flex; align-items: center; gap: 8px; color: var(--accent); text-decoration: none; font-weight: 600; font-size: 14px; transition: all 0.2s; }
.ao-link:hover { gap: 12px; }
.loading { text-align: center; padding: 60px 20px; }
.spinner { width: 42px; height: 42px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
.toast {
  position: fixed; bottom: 32px; right: 32px; background: var(--surface); backdrop-filter: blur(40px);
  border: 1px solid var(--border); border-radius: 16px; padding: 16px 20px; box-shadow: 0 16px 48px rgba(0,0,0,0.6);
  transform: translateY(120px); opacity: 0; transition: all 0.4s; z-index: 1000; font-size: 14px; font-weight: 600;
}
.toast.show { transform: translateY(0); opacity: 1; }
.load-more { text-align: center; padding: 20px; }
.sentinel { height: 1px; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
@media (max-width: 768px) {
  .hero h1 { font-size: 48px; }
  .hero p { font-size: 20px; }
  .container { padding: 0 20px; }
  .filters { padding: 20px; }
  .filter-grid { grid-template-columns: 1fr; }
  .ao-header { flex-direction: column; }
  .stat-value { font-size: 32px; }
}
</style>
</head>
<body>
<div class="bg-gradient"></div>

<div class="hero">
  <h1>AOFinder</h1>
  <p>Tous les appels d'offres informatique en temps réel</p>
  <div class="sources-badge"><div class="live"></div><span>API BOAMP Officielle · Données gouvernementales</span></div>
</div>

<div class="container">

  <!-- Filtres -->
  <div class="filters" role="region" aria-label="Filtres">
    <div class="filter-grid">
      <div class="filter-group">
        <label for="search">Recherche</label>
        <input type="text" id="search" placeholder="Ex: cloud, cybersécurité..." autocomplete="off" />
      </div>
      <div class="filter-group">
        <label for="min">Budget minimum (€)</label>
        <input type="number" id="min" placeholder="Ex: 50 000" inputmode="numeric"/>
      </div>
      <div class="filter-group">
        <label for="max">Budget maximum (€)</label>
        <input type="number" id="max" placeholder="Ex: 500 000" inputmode="numeric"/>
      </div>
      <div class="filter-group">
        <label for="region">Région</label>
        <select id="region">
          <option value="">Toute la France</option>
          <option value="ile-de-france">Île-de-France</option>
          <option value="grand-est">Grand Est</option>
          <option value="auvergne-rhone-alpes">Auvergne-Rhône-Alpes</option>
          <option value="occitanie">Occitanie</option>
          <option value="provence-alpes-cote-d-azur">PACA</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="sort">Tri</label>
        <select id="sort">
          <option value="date_desc">Date de parution (récent → ancien)</option>
          <option value="budget_desc">Budget (élevé → faible)</option>
          <option value="budget_asc">Budget (faible → élevé)</option>
          <option value="deadline_asc">Deadline (proche → lointain)</option>
        </select>
      </div>
    </div>
    <div class="controls">
      <button class="btn" id="resetBtn">Réinitialiser</button>
      <button class="btn" id="refreshBtn" title="Recharge depuis l'API">Rafraîchir</button>
      <button class="btn btn-primary" id="exportBtn">Exporter CSV</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats" aria-live="polite">
    <div class="stat-card">
      <div class="stat-value" id="tot">-</div>
      <div class="stat-label">Appels d'offres (après filtre)</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="bud">0 €</div>
      <div class="stat-label">Budget cumulé (après filtre)</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="rec">-</div>
      <div class="stat-label">Dernière mise à jour</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="totRaw">-</div>
      <div class="stat-label">Total récupéré (brut API)</div>
    </div>
  </div>

  <!-- Résultats -->
  <div id="res"></div>
  <div class="load-more">
    <button class="btn" id="loadMoreBtn" style="display:none">Charger plus</button>
  </div>
  <div id="sentinel" class="sentinel"></div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
// =============================
// Config & État
// =============================
const API_BASE = 'https://boamp-datadila.opendatasoft.com/api/records/1.0/search/';
const PER_PAGE = 50;
const CACHE_TTL_MS = 10 * 60 * 1000; // 10 minutes

let allAO = [];        // données brutes transformées
let filteredAO = [];   // données après filtres locaux
let displayed = 0;     // pagination
let searchTimeout;
let lastQuery = '';    // terme de recherche pour éviter recharges inutiles

// Mapping régions -> départements (codes et noms)
const regionsMap = {
  'ile-de-france': {
    codes: ['75','77','78','91','92','93','94','95'],
    names: ['paris','seine-et-marne','yvelines','essonne','hauts-de-seine','seine-saint-denis','val-de-marne','val-d\'oise','val-d’oise']
  },
  'grand-est': {
    codes: ['08','10','51','52','54','55','57','67','68','88'],
    names: ['ardennes','aube','marne','haute-marne','meurthe-et-moselle','meuse','moselle','bas-rhin','haut-rhin','vosges']
  },
  'auvergne-rhone-alpes': {
    codes: ['01','03','07','15','26','38','42','43','63','69','73','74'],
    names: ['ain','allier','ardèche','ardeche','cantal','drôme','drome','isère','isere','loire','haute-loire','puy-de-dôme','puy-de-dome','rhône','rhone','savoie','haute-savoie','haute savoie']
  },
  'occitanie': {
    codes: ['09','11','12','30','31','32','34','46','48','65','66','81','82'],
    names: ['ariège','ariege','aude','aveyron','gard','haute-garonne','haute garonne','gers','hérault','herault','lot','lozère','lozere','hautes-pyrénées','hautes pyrenees','pyrénées-orientales','pyrenees orientales','tarn','tarn-et-garonne','tarn et garonne']
  },
  'provence-alpes-cote-d-azur': {
    codes: ['04','05','06','13','83','84'],
    names: ['alpes-de-haute-provence','hautes-alpes','alpes-maritimes','bouches-du-rhône','bouches du rhone','var','vaucluse']
  }
};

// =============================
// Utilitaires
// =============================
function escapeHTML(str = '') {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#039;');
}
function fmtCurrency(n) {
  return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 }).format(n || 0);
}
function fmtDate(d) {
  if (!d || d === 'N/A') return 'N/A';
  try { return new Date(d).toLocaleDateString('fr-FR'); } catch { return d; }
}
// Budget robuste (string/array/object)
function extractBudget(fields) {
  let m = fields.montant ?? fields.valeurestimee ?? fields.montantmarche;
  if (!m) return 0;
  if (Array.isArray(m)) m = m[0];
  if (typeof m === 'object') {
    // cas {min, max, value}
    m = m.value ?? m.max ?? m.min ?? 0;
  }
  if (typeof m === 'string') m = m.replace(/[^0-9]/g, '');
  return parseInt(m) || 0;
}
// Description robuste
function extractDescription(fields) {
  let d = fields.descriptionlots ?? fields.objetmarche ?? fields.objet ?? '';
  if (Array.isArray(d)) d = d.join(' ');
  if (typeof d === 'object') d = JSON.stringify(d);
  d = String(d).replace(/<[^>]*>/g, ''); // strip HTML
  return d.slice(0, 220);
}
// Location normalisée
function extractLocation(fields) {
  const loc = fields.departement ?? fields.region ?? fields.ville ?? 'France';
  return Array.isArray(loc) ? loc.join(', ') : loc;
}
// ID normalisé
function extractId(fields) {
  return fields.idweb || fields.reference || fields.id || 'N/A';
}
// URL normalisée
function extractUrl(fields) {
  const id = fields.idweb;
  return fields.urlannonce || (id ? `https://www.boamp.fr/avis/detail/${id}` : '#');
}

// =============================
// Cache local
// =============================
function cacheKey(q) { return `aofinder:${q.toLowerCase().trim()}`; }
function saveCache(q, payload) {
  try {
    localStorage.setItem(cacheKey(q), JSON.stringify({ t: Date.now(), payload }));
  } catch {}
}
function loadCache(q) {
  try {
    const raw = localStorage.getItem(cacheKey(q));
    if (!raw) return null;
    const { t, payload } = JSON.parse(raw);
    if (Date.now() - t > CACHE_TTL_MS) return null;
    return payload;
  } catch { return null; }
}
function clearCache() {
  try {
    Object.keys(localStorage).forEach(k => { if (k.startsWith('aofinder:')) localStorage.removeItem(k); });
  } catch {}
}

// =============================
// Chargement API (appel minimal)
// =============================
async function fetchAO(query) {
  // Utilise cache si possible
  const cached = loadCache(query);
  if (cached) return cached;

  const params = new URLSearchParams();
  params.set('dataset', 'boamp');
  params.set('q', query || 'informatique OR IT OR cloud OR logiciel OR software');
  params.set('rows', '1000');
  params.set('sort', 'dateparution');
  // Facettes (append multiple)
  ['famillecpv', 'departement'].forEach(f => params.append('facet', f));

  const url = `${API_BASE}?${params.toString()}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();

  if (!data.records) throw new Error('Aucun enregistrement');

  const transformed = data.records.map(r => {
    const f = r.fields || {};
    return {
      id: extractId(f),
      title: f.objet || 'Sans titre',
      client: f.denominationsociale || f.nomentite || 'Non spécifié',
      budget: extractBudget(f),
      deadline: f.datelimitereponse || 'N/A',
      location: extractLocation(f),
      description: extractDescription(f),
      url: extractUrl(f),
      source: 'BOAMP',
      publishDate: f.dateparution || ''
    };
  });

  const result = { items: transformed, total: data.nhits || transformed.length, fetchedAt: Date.now() };
  saveCache(query, result);
  return result;
}

// =============================
// Filtres locaux + Tri + Pagination
// =============================
function regionFilterMatch(location, regionKey) {
  if (!regionKey) return true;
  const r = regionsMap[regionKey];
  if (!r) return true;

  const locStr = String(location || '').toLowerCase();
  // Essaye par codes (exacts) ou noms (inclusion)
  const codeMatch = r.codes.some(code => locStr === code || locStr.includes(`(${code})`) || locStr.includes(code.padStart(2,'0')));
  const nameMatch = r.names.some(name => locStr.includes(name));
  return codeMatch || nameMatch;
}

function applyFilters() {
  const q = (document.getElementById('search').value || '').trim().toLowerCase();
  const min = parseInt(document.getElementById('min').value) || 0;
  const max = parseInt(document.getElementById('max').value) || Number.MAX_SAFE_INTEGER;
  const region = document.getElementById('region').value;
  const sort = document.getElementById('sort').value;

  // Filtrage texte + budget + région
  let list = allAO.filter(ao => {
    const inText = !q || ao.title.toLowerCase().includes(q) || ao.description.toLowerCase().includes(q);
    const inBudget = (ao.budget >= min && ao.budget <= max);
    const inRegion = regionFilterMatch(ao.location, region);
    return inText && inBudget && inRegion;
  });

  // Tri
  list.sort((a, b) => {
    switch (sort) {
      case 'budget_desc': return (b.budget||0) - (a.budget||0);
      case 'budget_asc':  return (a.budget||0) - (b.budget||0);
      case 'deadline_asc': return new Date(a.deadline||'2999-12-31') - new Date(b.deadline||'2999-12-31');
      case 'date_desc':
      default: return new Date(b.publishDate||0) - new Date(a.publishDate||0);
    }
  });

  filteredAO = list;
  displayed = 0;
  renderList(); // met à jour stats aussi
}

function renderList() {
  const container = document.getElementById('res');
  const loadMoreBtn = document.getElementById('loadMoreBtn');

  // Pagination locale
  const toShow = filteredAO.slice(0, displayed + PER_PAGE);
  displayed = Math.min(displayed + PER_PAGE, filteredAO.length);

  if (!toShow.length) {
    container.innerHTML = `
      <div style="text-align:center;padding:80px;color:#a1a1a6;">
        <div style="font-size:64px;margin-bottom:12px;opacity:0.3;">🔍</div>
        <h2>Aucun appel d'offres trouvé</h2>
        <p style="margin-top:8px;color:var(--text3);">Modifiez les filtres ou élargissez la recherche.</p>
      </div>`;
    updateStats();
    loadMoreBtn.style.display = 'none';
    return;
  }

  let html = '<div class="ao-list">';
  for (const ao of toShow) {
    html += `
    <article class="ao-card">
      <div class="ao-header">
        <div>
          <h3 class="ao-title">${escapeHTML(ao.title)}</h3>
          <div class="ao-client">📍 ${escapeHTML(ao.client)}</div>
        </div>
        <div class="badge">📡 ${ao.source}</div>
      </div>
      <div class="ao-meta">
        <div class="meta-item"><div class="meta-label">RÉFÉRENCE</div><div class="meta-value">${escapeHTML(ao.id)}</div></div>
        <div class="meta-item"><div class="meta-label">BUDGET</div><div class="meta-value">${ao.budget > 0 ? fmtCurrency(ao.budget) : 'N/C'}</div></div>
        <div class="meta-item"><div class="meta-label">DEADLINE</div><div class="meta-value">${fmtDate(ao.deadline)}</div></div>
        <div class="meta-item"><div class="meta-label">LIEU</div><div class="meta-value">${escapeHTML(ao.location)}</div></div>
      </div>
      <p class="ao-desc">${escapeHTML(ao.description || 'Description non disponible')}</p>
      ${ao.url}Voir l'annonce complète <span>→</span></a>
    </article>`;
  }
  html += '</div>';

  // Bouton charger plus (visible si reste)
  const remain = filteredAO.length - displayed;
  if (remain > 0) {
    loadMoreBtn.style.display = 'inline-block';
    loadMoreBtn.textContent = `Charger plus (${remain} restants)`;
  } else {
    loadMoreBtn.style.display = 'none';
  }

  container.innerHTML = html;
  updateStats();
}

// =============================
// Stats
// =============================
function updateStats() {
  const totEl = document.getElementById('tot');
  const totRawEl = document.getElementById('totRaw');
  const budEl = document.getElementById('bud');
  const recEl = document.getElementById('rec');

  totEl.textContent = filteredAO.length.toLocaleString('fr-FR');
  totRawEl.textContent = allAO.__totalRaw?.toLocaleString('fr-FR') || allAO.length.toLocaleString('fr-FR');

  const totalBudget = filteredAO.reduce((sum, ao) => sum + (ao.budget || 0), 0);
  budEl.textContent = fmtCurrency(totalBudget);
  recEl.textContent = new Date().toLocaleDateString('fr-FR');
}

// =============================
// UI: toast, loader, debounce
// =============================
function toast(m) {
  const t = document.getElementById('toast');
  t.textContent = m;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

function showLoading() {
  document.getElementById('res').innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <h3>Chargement des appels d'offres réels...</h3>
      <p style="margin-top:8px;color:var(--text3);">Récupération depuis l'API BOAMP officielle</p>
    </div>`;
}

function debounce(fn, ms = 400) {
  return (...args) => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => fn(...args), ms);
  };
}

// =============================
// Export CSV
// =============================
function exportCSV() {
  if (!filteredAO.length) {
    toast('Aucun résultat à exporter');
    return;
  }
  const headers = ['id','title','client','budget','deadline','location','publishDate','url','source'];
  const rows = filteredAO.map(o => headers.map(h => {
    const val = (o[h] ?? '').toString().replace(/"/g,'""');
    return `"${val}"`;
  }).join(','));
  const csv = [headers.join(','), ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `aofinder_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

// =============================
// Infinite Scroll (IntersectionObserver)
// =============================
const sentinel = document.getElementById('sentinel');
const io = new IntersectionObserver((entries) => {
  const entry = entries[0];
  if (entry.isIntersecting) {
    // si on a encore des résultats à paginer, on affiche la page suivante
    if (displayed < filteredAO.length) renderList();
  }
}, { rootMargin: '200px' });
io.observe(sentinel);

// =============================
// Flux principal
// =============================
async function loadAO(force = false) {
  const q = (document.getElementById('search').value || '').trim();
  if (!force && q === lastQuery && allAO.length) {
    // Pas de nouvel appel API si même requête
    applyFilters();
    return;
  }

  showLoading();
  try {
    const { items, total } = await fetchAO(q);
    allAO = items;
    allAO.__totalRaw = total;  // mémorise total brut
    lastQuery = q;

    // Applique immédiatement filtres locaux
    applyFilters();
    toast(`✓ ${total.toLocaleString('fr-FR')} AO trouvés depuis l'API BOAMP`);
  } catch (e) {
    console.error(e);
    document.getElementById('res').innerHTML = `
      <div class="loading">
        <h3>⚠️ Erreur de connexion à l'API BOAMP</h3>
        <p style="margin-top:8px;color:var(--text3);">Vérifiez votre connexion internet</p>
      </div>`;
    toast('⚠️ Impossible de charger les données');
  }
}

// =============================
// Écouteurs UI
// =============================
document.getElementById('search').addEventListener('input', debounce(() => loadAO(false), 500));
// Filtrage local uniquement (pas de reload API)
document.getElementById('min').addEventListener('input', debounce(applyFilters, 250));
document.getElementById('max').addEventListener('input', debounce(applyFilters, 250));
document.getElementById('region').addEventListener('change', applyFilters);
document.getElementById('sort').addEventListener('change', applyFilters);

document.getElementById('resetBtn').addEventListener('click', () => {
  document.getElementById('search').value = '';
  document.getElementById('min').value = '';
  document.getElementById('max').value = '';
  document.getElementById('region').value = '';
  document.getElementById('sort').value = 'date_desc';
  loadAO(false);
});
document.getElementById('refreshBtn').addEventListener('click', () => {
  clearCache();
  loadAO(true);
});
document.getElementById('exportBtn').addEventListener('click', exportCSV);
document.getElementById('loadMoreBtn').addEventListener('click', () => renderList());

// Chargement au démarrage
window.addEventListener('load', () => loadAO(false));
</script>
</body>
</html>
