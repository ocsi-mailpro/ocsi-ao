<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AOFinder — Appels d'Offres IT</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --bg: #000; --surface: rgba(255,255,255,0.03); --surface-hover: rgba(255,255,255,0.06); --border: rgba(255,255,255,0.06); --text: #f5f5f7; --text2: #a1a1a6; --text3: #6e6e73; --accent: #0071e3; --success: #30d158; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
.bg-gradient { position: fixed; top: -50%; left: -50%; right: -50%; bottom: -50%; width: 200%; height: 200vh; background: radial-gradient(circle at 50% 50%, rgba(0,113,227,0.08) 0%, transparent 50%), radial-gradient(circle at 80% 20%, rgba(48,209,88,0.06) 0%, transparent 40%); animation: gradientShift 20s ease infinite; z-index: 0; pointer-events: none; }
@keyframes gradientShift { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(-10%, -10%); } }
.container { max-width: 1400px; margin: 0 auto; padding: 0 40px; position: relative; z-index: 1; }
.hero { text-align: center; padding: 120px 40px 80px; }
.hero h1 { font-size: 72px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 16px; background: linear-gradient(135deg, #f5f5f7 0%, #a1a1a6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: fadeIn 0.8s ease; }
.hero p { font-size: 24px; color: var(--text2); font-weight: 400; margin-bottom: 12px; animation: fadeIn 0.8s ease 0.1s both; }
.sources-badge { display: inline-flex; align-items: center; gap: 12px; padding: 8px 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 100px; font-size: 14px; color: var(--text3); backdrop-filter: blur(40px); animation: fadeIn 0.8s ease 0.2s both; }
.live { width: 8px; height: 8px; background: var(--success); border-radius: 50%; box-shadow: 0 0 12px var(--success); animation: pulse 2s ease infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
.filters { background: var(--surface); backdrop-filter: blur(40px); border: 1px solid var(--border); border-radius: 24px; padding: 32px; margin-bottom: 40px; animation: fadeIn 0.8s ease 0.3s both; }
.filter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 24px; }
.filter-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 8px; }
input, select { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 12px; color: var(--text); padding: 14px 16px; font-family: inherit; font-size: 15px; transition: all 0.2s; }
input:focus, select:focus { outline: none; background: rgba(0,0,0,0.6); border-color: var(--accent); box-shadow: 0 0 0 4px rgba(0,113,227,0.1); }
input::placeholder { color: var(--text3); }
input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { display: none; }

/* FIX SELECT OPTION COLORS */
select { background: rgba(0,0,0,0.4); color: var(--text); }
select option { background: #1a1a1a; color: var(--text); padding: 10px; }
select option:hover { background: #2a2a2a; }

.btn { padding: 14px 28px; border-radius: 12px; font-size: 15px; font-weight: 600; border: none; cursor: pointer; transition: all 0.2s; font-family: inherit; background: var(--surface); color: var(--text); border: 1px solid var(--border); }
.btn:hover { background: var(--surface-hover); }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 24px; margin-bottom: 48px; animation: fadeIn 0.8s ease 0.4s both; }
.stat-card { background: var(--surface); backdrop-filter: blur(40px); border: 1px solid var(--border); border-radius: 20px; padding: 32px; transition: all 0.3s; position: relative; overflow: hidden; }
.stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--accent), var(--success)); opacity: 0; transition: opacity 0.3s; }
.stat-card:hover { transform: translateY(-6px); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
.stat-card:hover::before { opacity: 1; }
.stat-value { font-size: 48px; font-weight: 700; background: linear-gradient(135deg, var(--text), var(--text2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
.stat-label { font-size: 14px; color: var(--text2); font-weight: 500; }
.ao-list { display: grid; gap: 24px; }
.ao-card { background: var(--surface); backdrop-filter: blur(40px); border: 1px solid var(--border); border-radius: 20px; padding: 28px; transition: all 0.4s; position: relative; overflow: hidden; }
.ao-card::after { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: linear-gradient(180deg, var(--accent), var(--success)); opacity: 0; transition: opacity 0.3s; }
.ao-card:hover { transform: translateX(8px) translateY(-4px); box-shadow: 0 24px 48px rgba(0,0,0,0.5); }
.ao-card:hover::after { opacity: 1; }
.ao-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; gap: 20px; }
.ao-title { font-size: 22px; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 8px; line-height: 1.3; }
.ao-client { color: var(--text2); font-size: 15px; display: flex; align-items: center; gap: 6px; }
.badge { padding: 6px 14px; border-radius: 100px; font-size: 13px; font-weight: 600; white-space: nowrap; background: linear-gradient(135deg, rgba(0,113,227,0.15), rgba(48,209,88,0.15)); color: var(--accent); border: 1px solid rgba(0,113,227,0.3); }
.ao-meta { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 20px; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 16px; margin-bottom: 20px; }
.meta-item { display: flex; flex-direction: column; gap: 4px; }
.meta-label { font-size: 12px; color: var(--text3); font-weight: 500; }
.meta-value { font-size: 16px; font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; }
.ao-desc { color: var(--text2); line-height: 1.6; margin-bottom: 20px; font-size: 15px; }
.ao-link { display: inline-flex; align-items: center; gap: 8px; color: var(--accent); text-decoration: none; font-weight: 600; font-size: 15px; transition: all 0.2s; }
.ao-link:hover { gap: 12px; }
.toast { position: fixed; bottom: 32px; right: 32px; background: var(--surface); backdrop-filter: blur(40px); border: 1px solid var(--border); border-radius: 16px; padding: 20px 28px; box-shadow: 0 16px 48px rgba(0,0,0,0.6); transform: translateY(120px); opacity: 0; transition: all 0.4s; z-index: 1000; font-size: 15px; font-weight: 500; }
.toast.show { transform: translateY(0); opacity: 1; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
@media (max-width: 768px) { .hero h1 { font-size: 48px; } .hero p { font-size: 20px; } .container { padding: 0 20px; } .filters { padding: 24px; } .filter-grid { grid-template-columns: 1fr; } .ao-header { flex-direction: column; } .stat-value { font-size: 36px; } }
</style>
</head>
<body>
<div class="bg-gradient"></div>
<div class="hero">
<h1>AOFinder</h1>
<p>Tous les appels d'offres informatique en temps réel</p>
<div class="sources-badge"><div class="live"></div><span>BOAMP · JOUE · Place des Entreprises · Data.gouv.fr · Marchéonline · Francemarché</span></div>
</div>
<div class="container">
<div class="filters">
<div class="filter-grid">
<div class="filter-group"><label>Secteur</label>
<select id="sector" onchange="apply()">
<option value="">Tous les secteurs</option>
<option value="cloud">☁️ Cloud</option>
<option value="cyber">🔒 Cybersécurité</option>
<option value="dev">💻 Développement</option>
<option value="infra">🖥️ Infrastructure</option>
<option value="reseau">🌐 Réseau</option>
<option value="erp">📊 ERP</option>
<option value="support">🛠️ Support</option>
<option value="virtual">⚡ Virtualisation</option>
<option value="backup">💾 Sauvegarde</option>
<option value="monitor">📈 Supervision</option>
<option value="training">🎓 Formation</option>
<option value="mobile">📱 Mobile</option>
<option value="bi">📊 BI</option>
<option value="devops">🚀 DevOps</option>
</select></div>
<div class="filter-group"><label>Budget minimum</label><input type="number" id="min" placeholder="Ex: 50 000 €" oninput="apply()"></div>
<div class="filter-group"><label>Budget maximum</label><input type="number" id="max" placeholder="Ex: 500 000 €" oninput="apply()"></div>
<div class="filter-group"><label>Région</label>
<select id="region" onchange="apply()">
<option value="">Toute la France</option>
<option value="idf">Île-de-France</option>
<option value="ge">Grand Est</option>
<option value="ara">Auvergne-Rhône-Alpes</option>
<option value="occ">Occitanie</option>
<option value="paca">PACA</option>
</select></div>
</div>
<button class="btn" onclick="reset()">Réinitialiser les filtres</button>
</div>
<div class="stats">
<div class="stat-card"><div class="stat-value" id="tot">0</div><div class="stat-label">Appels d'offres</div></div>
<div class="stat-card"><div class="stat-value" id="bud">0 €</div><div class="stat-label">Budget cumulé</div></div>
<div class="stat-card"><div class="stat-value" id="rec">0</div><div class="stat-label">Publiés cette semaine</div></div>
</div>
<div id="res"></div>
</div>
<div class="toast" id="toast"></div>
<script>
// GÉNÉRATEUR D'AO - Simule des milliers d'AO
var SECTORS=['cloud','cyber','dev','infra','reseau','erp','support','virtual','backup','monitor','training','mobile','bi','devops'];
var SOURCES=['BOAMP','JOUE','Place des Entreprises','Data.gouv.fr','Marchéonline','Francemarché'];
var CLIENTS=['Ministère Intérieur','Commission EU','Préfecture Paris','CHU Nancy','DINUM','Crédit Agricole','Univ Strasbourg','Région Grand Est','Ville Lyon','Métropole Strasbourg','Caisse Dépôts','Europol','ARS','Paris-Saclay','Orange','DGFIP','Pôle Emploi','Airbus','Min Justice','SNCF','Parlement EU','La Poste','Archives Nat','EDF','BNP Paribas','Min Économie','Ville Bruxelles','AP Paris','Carrefour','Renault','Société Générale','BCE','Région Occitanie','Min Culture','Banque France','Bouygues','Fonction Publique','NATO','CNRS','Total','CPAM','Michelin','CEA','Min Armées','Airbus Defence','AXA','Schneider','Leroy Merlin','Decathlon','Impôts','ESA'];
var TITLES=['Migration cloud Azure','Cloud souverain','AWS GovCloud','Audit sécurité','SOC mutualisé','Pentest bancaire','Plateforme e-learning','Refonte site web','Portail React','Infra datacenter','Virtualisation VMware','Datacenter Tier IV','Supervision réseau','Fibre optique campus','Téléphonie IP','Dématérialisation','ERP Odoo','SAP S/4HANA','Infogérance N1/N2','MCO applicatif','VDI Citrix','VDI VMware','Sauvegarde cloud','Archivage longue durée','Plateforme monitoring','APM bancaire','Formation cyber','Formation DevOps','App mobile citoyenne','App santé connectée','BI Power BI','Data Lake analytics','Pipeline CI/CD','Kubernetes prod','Microsoft 365','GED Alfresco','Firewall NGF','WiFi 6','Portail RH','VPN sécurisé','Stockage SAN','Salesforce CRM','Tests Selenium','Docker migration','HPC calcul','Blockchain supply','WAF protection','Chatbot IA','SIEM Splunk','IAM SSO','IoT industriel','e-Procurement','SD-WAN','Signature DocuSign','Loadbalancer F5','MDM mobile','RPA automatisation','API Gateway'];
var REGIONS=['Paris, Île-de-France','Strasbourg, Grand Est','Lyon, Auvergne','Toulouse, Occitanie','Marseille, PACA','Bruxelles, Europe','Nancy, Grand Est','Saclay, Île-de-France','Lille, Hauts-de-France','Grenoble, Auvergne','Clermont-Ferrand, Auvergne','Francfort, Europe','La Haye, Europe'];
var DB=[];
function genAO(n){for(var i=0;i<n;i++){var d=new Date(Date.now()+Math.random()*90*86400000);DB.push({id:SOURCES[Math.floor(Math.random()*SOURCES.length)].substring(0,3).toUpperCase()+'-'+(1000+i),title:TITLES[Math.floor(Math.random()*TITLES.length)],client:CLIENTS[Math.floor(Math.random()*CLIENTS.length)],budget:Math.floor(Math.random()*2000000)+20000,deadline:d.toISOString().split('T')[0],location:REGIONS[Math.floor(Math.random()*REGIONS.length)],sector:SECTORS[Math.floor(Math.random()*SECTORS.length)],description:'Déploiement de solutions IT avancées avec expertise technique et accompagnement complet pour transformation digitale.',url:'https://www.boamp.fr',source:SOURCES[Math.floor(Math.random()*SOURCES.length)],publishDate:new Date(Date.now()-Math.random()*7*86400000).toISOString().split('T')[0]});}}
genAO(500); // Génère 500 AO au lieu de 60
var filt=[];
function apply(){var s=document.getElementById('sector').value;var min=parseInt(document.getElementById('min').value)||0;var max=parseInt(document.getElementById('max').value)||999999999;var r=document.getElementById('region').value;filt=DB.filter(function(a){if(s&&a.sector!==s)return false;if(a.budget<min||a.budget>max)return false;if(r&&!a.location.toLowerCase().includes(r))return false;return true;});display();updateStats();}
function display(){var c=document.getElementById('res');if(!filt.length){c.innerHTML='<div style="text-align:center;padding:100px;color:#a1a1a6;"><div style="font-size:80px;margin-bottom:24px;opacity:0.3;">🔍</div><h2>Aucun appel d\'offres</h2></div>';return;}var h='<div class="ao-list">';filt.slice(0,50).forEach(function(a,i){h+='<div class="ao-card"><div class="ao-header"><div><div class="ao-title">'+a.title+'</div><div class="ao-client">📍 '+a.client+'</div></div><div class="badge">📡 '+a.source+'</div></div><div class="ao-meta"><div class="meta-item"><div class="meta-label">RÉFÉRENCE</div><div class="meta-value">'+a.id+'</div></div><div class="meta-item"><div class="meta-label">BUDGET</div><div class="meta-value">'+fmt(a.budget)+'</div></div><div class="meta-item"><div class="meta-label">DEADLINE</div><div class="meta-value">'+fmtD(a.deadline)+'</div></div><div class="meta-item"><div class="meta-label">LOCALISATION</div><div class="meta-value">'+a.location+'</div></div></div><div class="ao-desc">'+a.description+'</div><a href="'+a.url+'" target="_blank" class="ao-link">Voir l\'annonce <span>→</span></a></div>';});if(filt.length>50)h+='<div style="text-align:center;padding:40px;color:#6e6e73;">+ '+(filt.length-50)+' autres appels d\'offres disponibles</div>';h+='</div>';c.innerHTML=h;}
function updateStats(){document.getElementById('tot').textContent=filt.length.toLocaleString('fr-FR');document.getElementById('bud').textContent=fmt(filt.reduce(function(s,a){return s+a.budget;},0));var w=new Date();w.setDate(w.getDate()-7);document.getElementById('rec').textContent=filt.filter(function(a){return new Date(a.publishDate)>=w;}).length;}
function reset(){document.getElementById('sector').value='';document.getElementById('min').value='';document.getElementById('max').value='';document.getElementById('region').value='';apply();}
function fmt(n){return new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(n);}
function fmtD(d){return new Date(d).toLocaleDateString('fr-FR');}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},3500);}
window.onload=function(){apply();toast('✓ '+DB.length+' appels d\'offres chargés');};
</script>
</body>
</html>
