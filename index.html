<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AOFinder — Appels d'Offres IT</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-primary: #000000;
  --bg-secondary: #0a0a0a;
  --surface: rgba(255, 255, 255, 0.03);
  --surface-hover: rgba(255, 255, 255, 0.06);
  --surface-active: rgba(255, 255, 255, 0.08);
  --border: rgba(255, 255, 255, 0.06);
  --text-primary: #f5f5f7;
  --text-secondary: #a1a1a6;
  --text-tertiary: #6e6e73;
  --accent: #0071e3;
  --accent-hover: #0077ed;
  --success: #30d158;
  --warning: #ff9f0a;
  --danger: #ff453a;
  --blur: blur(40px);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'SF Pro Display', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
}

/* Animated gradient background */
.bg-gradient {
  position: fixed;
  top: -50%;
  left: -50%;
  right: -50%;
  bottom: -50%;
  width: 200%;
  height: 200vh;
  background: radial-gradient(circle at 50% 50%, rgba(0, 113, 227, 0.08) 0%, transparent 50%),
              radial-gradient(circle at 80% 20%, rgba(48, 209, 88, 0.06) 0%, transparent 40%),
              radial-gradient(circle at 20% 80%, rgba(255, 159, 10, 0.05) 0%, transparent 40%);
  animation: gradientShift 20s ease infinite;
  z-index: 0;
  pointer-events: none;
}

@keyframes gradientShift {
  0%, 100% { transform: translate(0, 0) rotate(0deg); }
  50% { transform: translate(-10%, -10%) rotate(2deg); }
}

.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 40px;
  position: relative;
  z-index: 1;
}

/* Hero Section - Apple style */
.hero {
  text-align: center;
  padding: 120px 40px 80px;
  position: relative;
}

.hero h1 {
  font-size: 72px;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 16px;
  background: linear-gradient(135deg, #f5f5f7 0%, #a1a1a6 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: fadeInUp 0.8s ease;
}

.hero p {
  font-size: 24px;
  color: var(--text-secondary);
  font-weight: 400;
  margin-bottom: 12px;
  animation: fadeInUp 0.8s ease 0.1s both;
}

.sources-badge {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 8px 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 100px;
  font-size: 14px;
  color: var(--text-tertiary);
  backdrop-filter: var(--blur);
  animation: fadeInUp 0.8s ease 0.2s both;
}

.live-indicator {
  width: 8px;
  height: 8px;
  background: var(--success);
  border-radius: 50%;
  box-shadow: 0 0 12px var(--success);
  animation: pulse 2s ease infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(1.2); }
}

/* Glassmorphism filters */
.filters {
  background: var(--surface);
  backdrop-filter: var(--blur);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 32px;
  margin-bottom: 40px;
  animation: fadeInUp 0.8s ease 0.3s both;
}

.filter-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
  margin-bottom: 24px;
}

.filter-group label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 8px;
  letter-spacing: 0.3px;
}

input, select {
  width: 100%;
  background: var(--surface-active);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text-primary);
  padding: 14px 16px;
  font-family: inherit;
  font-size: 15px;
  transition: all 0.2s ease;
}

input:focus, select:focus {
  outline: none;
  background: var(--surface-hover);
  border-color: var(--accent);
  box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1);
}

input::placeholder {
  color: var(--text-tertiary);
}

input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button {
  display: none;
}

.btn {
  padding: 14px 28px;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 600;
  border: none;
  cursor: pointer;
  transition: all 0.2s ease;
  font-family: inherit;
}

.btn-primary {
  background: var(--accent);
  color: white;
}

.btn-primary:hover {
  background: var(--accent-hover);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0, 113, 227, 0.3);
}

.btn-secondary {
  background: var(--surface);
  color: var(--text-primary);
  border: 1px solid var(--border);
}

.btn-secondary:hover {
  background: var(--surface-hover);
}

/* Stats cards - Apple style */
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 24px;
  margin-bottom: 48px;
  animation: fadeInUp 0.8s ease 0.4s both;
}

.stat-card {
  background: var(--surface);
  backdrop-filter: var(--blur);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 32px;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
}

.stat-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--success));
  opacity: 0;
  transition: opacity 0.3s;
}

.stat-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
  border-color: rgba(255, 255, 255, 0.1);
}

.stat-card:hover::before {
  opacity: 1;
}

.stat-value {
  font-size: 48px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
  letter-spacing: -0.02em;
}

.stat-label {
  font-size: 14px;
  color: var(--text-secondary);
  font-weight: 500;
}

/* AO Cards - Ultra premium */
.ao-list {
  display: grid;
  gap: 24px;
}

.ao-card {
  background: var(--surface);
  backdrop-filter: var(--blur);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 28px;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
  animation: fadeInUp 0.6s ease both;
}

.ao-card::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 4px;
  height: 100%;
  background: linear-gradient(180deg, var(--accent), var(--success));
  opacity: 0;
  transition: opacity 0.3s;
}

.ao-card:hover {
  transform: translateX(8px) translateY(-4px);
  box-shadow: 0 24px 48px rgba(0, 0, 0, 0.5);
  border-color: rgba(255, 255, 255, 0.12);
}

.ao-card:hover::after {
  opacity: 1;
}

.ao-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 20px;
  gap: 20px;
}

.ao-title {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.01em;
  margin-bottom: 8px;
  line-height: 1.3;
}

.ao-client {
  color: var(--text-secondary);
  font-size: 15px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.badge {
  padding: 6px 14px;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 6px;
}

.badge-source {
  background: linear-gradient(135deg, rgba(0, 113, 227, 0.15), rgba(48, 209, 88, 0.15));
  color: var(--accent);
  border: 1px solid rgba(0, 113, 227, 0.3);
}

.ao-meta {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 20px;
  padding: 20px;
  background: var(--surface-active);
  border-radius: 16px;
  margin-bottom: 20px;
}

.meta-item {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.meta-label {
  font-size: 12px;
  color: var(--text-tertiary);
  font-weight: 500;
  letter-spacing: 0.5px;
}

.meta-value {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
}

.ao-description {
  color: var(--text-secondary);
  line-height: 1.6;
  margin-bottom: 20px;
  font-size: 15px;
}

.ao-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--accent);
  text-decoration: none;
  font-weight: 600;
  font-size: 15px;
  transition: all 0.2s;
}

.ao-link:hover {
  gap: 12px;
  color: var(--accent-hover);
}

.loading {
  text-align: center;
  padding: 100px 40px;
  color: var(--text-secondary);
}

.spinner {
  width: 60px;
  height: 60px;
  border: 3px solid var(--surface-active);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 24px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.empty {
  text-align: center;
  padding: 100px 40px;
  color: var(--text-secondary);
}

.empty-icon {
  font-size: 80px;
  margin-bottom: 24px;
  opacity: 0.3;
}

.toast {
  position: fixed;
  bottom: 32px;
  right: 32px;
  background: var(--surface);
  backdrop-filter: var(--blur);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px 28px;
  box-shadow: 0 16px 48px rgba(0, 0, 0, 0.6);
  transform: translateY(120px);
  opacity: 0;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 1000;
  font-size: 15px;
  font-weight: 500;
}

.toast.show {
  transform: translateY(0);
  opacity: 1;
}

@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Responsive */
@media (max-width: 768px) {
  .hero h1 { font-size: 48px; }
  .hero p { font-size: 20px; }
  .container { padding: 0 20px; }
  .filters { padding: 24px; }
  .filter-grid { grid-template-columns: 1fr; }
  .ao-header { flex-direction: column; }
  .stat-value { font-size: 36px; }
}
</style>
</head>

var filt=[];
function applyFilters(){var s=document.getElementById('sector').value;var min=parseInt(document.getElementById('budgetMin').value)||0;var max=parseInt(document.getElementById('budgetMax').value)||999999999;var r=document.getElementById('region').value.toLowerCase();filt=DB.filter(function(a){if(s&&a.sector!==s)return false;if(a.budget<min||a.budget>max)return false;if(r&&!a.location.toLowerCase().includes(r.replace('-',' ')))return false;return true;});display();updateStats();}
function display(){var c=document.getElementById('results');if(!filt.length){c.innerHTML='<div class="empty"><div class="empty-icon">🔍</div><h2>Aucun appel d\'offres trouvé</h2><p style="margin-top:12px;">Essayez d\'ajuster vos critères de recherche</p></div>';return;}var h='<div class="ao-list">';filt.forEach(function(a,i){h+='<div class="ao-card" style="animation-delay:'+i*0.05+'s"><div class="ao-header"><div><div class="ao-title">'+a.title+'</div><div class="ao-client">📍 '+a.client+'</div></div><div class="badge badge-source">📡 '+a.source+'</div></div><div class="ao-meta"><div class="meta-item"><div class="meta-label">RÉFÉRENCE</div><div class="meta-value">'+a.id+'</div></div><div class="meta-item"><div class="meta-label">BUDGET</div><div class="meta-value">'+fmt(a.budget)+'</div></div><div class="meta-item"><div class="meta-label">DATE LIMITE</div><div class="meta-value">'+fmtD(a.deadline)+'</div></div><div class="meta-item"><div class="meta-label">LOCALISATION</div><div class="meta-value">'+a.location+'</div></div></div><div class="ao-description">'+a.description+'</div><a href="'+a.url+'" target="_blank" class="ao-link">Voir l\'annonce complète <span>→</span></a></div>';});h+='</div>';c.innerHTML=h;}
function updateStats(){document.getElementById('statTotal').textContent=filt.length;document.getElementById('statBudget').textContent=fmt(filt.reduce(function(s,a){return s+a.budget;},0));var w=new Date();w.setDate(w.getDate()-7);document.getElementById('statRecent').textContent=filt.filter(function(a){return new Date(a.publishDate)>=w;}).length;}
function resetFilters(){document.getElementById('sector').value='';document.getElementById('budgetMin').value='';document.getElementById('budgetMax').value='';document.getElementById('region').value='';applyFilters();}
function fmt(n){return new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(n);}
function fmtD(d){return new Date(d).toLocaleDateString('fr-FR');}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},3500);}
window.onload=function(){applyFilters();toast('✓ 60 appels d\'offres chargés · Scraping en temps réel bientôt disponible');};
