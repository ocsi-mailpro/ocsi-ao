<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AOFinder — Appels d'Offres IT en temps réel</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --bg: #000; --surface: rgba(255,255,255,0.03); --surface-hover: rgba(255,255,255,0.06); --border: rgba(255,255,255,0.06); --text: #f5f5f7; --text2: #a1a1a6; --text3: #6e6e73; --accent: #0071e3; --success: #30d158; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
.bg-gradient { position: fixed; top: -50%; left: -50%; right: -50%; bottom: -50%; width: 200%; height: 200vh; background: radial-gradient(circle at 50% 50%, rgba(0,113,227,0.08) 0%, transparent 50%), radial-gradient(circle at 80% 20%, rgba(48,209,88,0.06) 0%, transparent 40%); animation: gradientShift 20s ease infinite; z-index: 0; pointer-events: none; }
@keyframes gradientShift { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(-10%, -10%); } }
.container { max-width: 1400px; margin: 0 auto; padding: 0 40px; position: relative; z-index: 1; }
.hero { text-align: center; padding: 120px 40px 80px; }
.hero h1 { font-size: 72px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 16px; background: linear-gradient(135deg, #f5f5f7 0%, #a1a1a6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: fadeIn 0.8s ease; }
.hero p { font-size: 24px; color: var(--text2); font-weight: 400; margin-bottom: 12px; animation: fadeIn 0.8s ease 0.1s both; }
.sources-badge { display: inline-flex; align-items: center; gap: 12px; padding: 8px 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 100px; font-size: 14px; color: var(--text3); backdrop-filter: blur(40px); animation: fadeIn 0.8s ease 0.2s both; }
.live { width: 8px; height: 8px; background: var(--success); border-radius: 50%; box-shadow: 0 0 12px var(--success); animation: pulse 2s ease infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
.filters { background: var(--surface); backdrop-filter: blur(40px); border: 1px solid var(--border); border-radius: 24px; padding: 32px; margin-bottom: 40px; animation: fadeIn 0.8s ease 0.3s both; }
.filter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 24px; }
.filter-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 8px; }
input, select { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 12px; color: var(--text); padding: 14px 16px; font-family: inherit; font-size: 15px; transition: all 0.2s; }
input:focus, select:focus { outline: none; background: rgba(0,0,0,0.6); border-color: var(--accent); box-shadow: 0 0 0 4px rgba(0,113,227,0.1); }
input::placeholder { color: var(--text3); }
input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { display: none; }
select { background: rgba(0,0,0,0.4); color: var(--text); }
select option { background: #1a1a1a; color: var(--text); padding: 10px; }
.btn { padding: 14px 28px; border-radius: 12px; font-size: 15px; font-weight: 600; border: none; cursor: pointer; transition: all 0.2s; font-family: inherit; background: var(--surface); color: var(--text); border: 1px solid var(--border); }
.btn:hover { background: var(--surface-hover); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 24px; margin-bottom: 48px; animation: fadeIn 0.8s ease 0.4s both; }
.stat-card { background: var(--surface); backdrop-filter: blur(40px); border: 1px solid var(--border); border-radius: 20px; padding: 32px; transition: all 0.3s; position: relative; overflow: hidden; }
.stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--accent), var(--success)); opacity: 0; transition: opacity 0.3s; }
.stat-card:hover { transform: translateY(-6px); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
.stat-card:hover::before { opacity: 1; }
.stat-value { font-size: 48px; font-weight: 700; background: linear-gradient(135deg, var(--text), var(--text2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
.stat-label { font-size: 14px; color: var(--text2); font-weight: 500; }
.ao-list { display: grid; gap: 24px; }
.ao-card { background: var(--surface); backdrop-filter: blur(40px); border: 1px solid var(--border); border-radius: 20px; padding: 28px; transition: all 0.4s; position: relative; overflow: hidden; }
.ao-card::after { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: linear-gradient(180deg, var(--accent), var(--success)); opacity: 0; transition: opacity 0.3s; }
.ao-card:hover { transform: translateX(8px) translateY(-4px); box-shadow: 0 24px 48px rgba(0,0,0,0.5); }
.ao-card:hover::after { opacity: 1; }
.ao-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; gap: 20px; }
.ao-title { font-size: 22px; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 8px; line-height: 1.3; }
.ao-client { color: var(--text2); font-size: 15px; display: flex; align-items: center; gap: 6px; }
.badge { padding: 6px 14px; border-radius: 100px; font-size: 13px; font-weight: 600; white-space: nowrap; background: linear-gradient(135deg, rgba(0,113,227,0.15), rgba(48,209,88,0.15)); color: var(--accent); border: 1px solid rgba(0,113,227,0.3); }
.ao-meta { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 20px; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 16px; margin-bottom: 20px; }
.meta-item { display: flex; flex-direction: column; gap: 4px; }
.meta-label { font-size: 12px; color: var(--text3); font-weight: 500; text-transform: uppercase; }
.meta-value { font-size: 16px; font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; }
.ao-link { display: inline-flex; align-items: center; gap: 8px; color: var(--accent); text-decoration: none; font-weight: 600; font-size: 15px; transition: all 0.2s; }
.ao-link:hover { gap: 12px; }
.loading { text-align: center; padding: 100px 40px; }
.spinner { width: 60px; height: 60px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 24px; }
@keyframes spin { to { transform: rotate(360deg); } }
.toast { position: fixed; bottom: 32px; right: 32px; background: var(--surface); backdrop-filter: blur(40px); border: 1px solid var(--border); border-radius: 16px; padding: 20px 28px; box-shadow: 0 16px 48px rgba(0,0,0,0.6); transform: translateY(120px); opacity: 0; transition: all 0.4s; z-index: 1000; font-size: 15px; font-weight: 500; }
.toast.show { transform: translateY(0); opacity: 1; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
.load-more { text-align: center; padding: 40px; }
.load-more .btn { background: var(--accent); color: white; }
.load-more .btn:hover { background: #0077ed; }
@media (max-width: 768px) { .hero h1 { font-size: 48px; } .hero p { font-size: 20px; } .container { padding: 0 20px; } .filters { padding: 24px; } .filter-grid { grid-template-columns: 1fr; } .ao-header { flex-direction: column; } .stat-value { font-size: 36px; } }
</style>
</head>
<body>
<div class="bg-gradient"></div>
<div class="hero">
<h1>AOFinder</h1>
<p>Tous les appels d'offres informatique en temps réel</p>
<div class="sources-badge"><div class="live"></div><span>API BOAMP Officielle · Données gouvernementales</span></div>
</div>
<div class="container">
<div class="filters">
<div class="filter-grid">
<div class="filter-group"><label>Recherche</label><input type="text" id="search" placeholder="Ex: cloud, cybersécurité..." oninput="debounceSearch()"></div>
<div class="filter-group"><label>Budget minimum (€)</label><input type="number" id="min" placeholder="Ex: 50 000 €" oninput="debounceSearch()"></div>
<div class="filter-group"><label>Budget maximum (€)</label><input type="number" id="max" placeholder="Ex: 500 000 €" oninput="debounceSearch()"></div>
<div class="filter-group"><label>Région / Département</label>
<select id="region" onchange="loadAO()">
<option value="">🇫🇷 Toute la France</option>
<optgroup label="Île-de-France">
<option value="75">75 - Paris</option>
<option value="77">77 - Seine-et-Marne</option>
<option value="78">78 - Yvelines</option>
<option value="91">91 - Essonne</option>
<option value="92">92 - Hauts-de-Seine</option>
<option value="93">93 - Seine-Saint-Denis</option>
<option value="94">94 - Val-de-Marne</option>
<option value="95">95 - Val-d'Oise</option>
</optgroup>
<optgroup label="Grand Est">
<option value="08">08 - Ardennes</option>
<option value="10">10 - Aube</option>
<option value="51">51 - Marne</option>
<option value="52">52 - Haute-Marne</option>
<option value="54">54 - Meurthe-et-Moselle</option>
<option value="55">55 - Meuse</option>
<option value="57">57 - Moselle</option>
<option value="67">67 - Bas-Rhin</option>
<option value="68">68 - Haut-Rhin</option>
<option value="88">88 - Vosges</option>
</optgroup>
<optgroup label="Auvergne-Rhône-Alpes">
<option value="01">01 - Ain</option>
<option value="03">03 - Allier</option>
<option value="07">07 - Ardèche</option>
<option value="15">15 - Cantal</option>
<option value="26">26 - Drôme</option>
<option value="38">38 - Isère</option>
<option value="42">42 - Loire</option>
<option value="43">43 - Haute-Loire</option>
<option value="63">63 - Puy-de-Dôme</option>
<option value="69">69 - Rhône</option>
<option value="73">73 - Savoie</option>
<option value="74">74 - Haute-Savoie</option>
</optgroup>
<optgroup label="Occitanie">
<option value="09">09 - Ariège</option>
<option value="11">11 - Aude</option>
<option value="12">12 - Aveyron</option>
<option value="30">30 - Gard</option>
<option value="31">31 - Haute-Garonne</option>
<option value="32">32 - Gers</option>
<option value="34">34 - Hérault</option>
<option value="46">46 - Lot</option>
<option value="48">48 - Lozère</option>
<option value="65">65 - Hautes-Pyrénées</option>
<option value="66">66 - Pyrénées-Orientales</option>
<option value="81">81 - Tarn</option>
<option value="82">82 - Tarn-et-Garonne</option>
</optgroup>
<optgroup label="PACA">
<option value="04">04 - Alpes-de-Haute-Provence</option>
<option value="05">05 - Hautes-Alpes</option>
<option value="06">06 - Alpes-Maritimes</option>
<option value="13">13 - Bouches-du-Rhône</option>
<option value="83">83 - Var</option>
<option value="84">84 - Vaucluse</option>
</optgroup>
<optgroup label="Autres régions">
<option value="59">59 - Nord</option>
<option value="33">33 - Gironde</option>
<option value="44">44 - Loire-Atlantique</option>
<option value="35">35 - Ille-et-Vilaine</option>
</optgroup>
</select></div>
</div>
<button class="btn" onclick="reset()">Réinitialiser</button>
</div>
<div class="stats">
<div class="stat-card"><div class="stat-value" id="tot">-</div><div class="stat-label">Appels d'offres</div></div>
<div class="stat-card"><div class="stat-value" id="bud">0 €</div><div class="stat-label">Budget cumulé</div></div>
<div class="stat-card"><div class="stat-value" id="rec">-</div><div class="stat-label">Dernière MAJ</div></div>
</div>
<div id="res"></div>
</div>
<div class="toast" id="toast"></div>
<script>
// Utilise le proxy local Python (lance "python proxy.py" d'abord)
const USE_LOCAL_PROXY = true;
const LOCAL_API = 'http://localhost:5000/api/ao';
const PROXY = 'https://api.allorigins.win/raw?url=';
const BOAMP_API = 'https://boamp-datadila.opendatasoft.com/api/explore/v2.1/catalog/datasets/boamp/records';

let allAO = [];
let displayed = 0;
const PER_PAGE = 50;
let searchTimeout;

async function loadAO() {
  const searchTerm = document.getElementById('search').value;
  const dept = document.getElementById('region').value;
  const min = document.getElementById('min').value || 0;
  const max = document.getElementById('max').value || 999999999;
  const container = document.getElementById('res');
  
  container.innerHTML = '<div class="loading"><div class="spinner"></div><h3>Chargement des appels d\'offres...</h3><p style="margin-top:12px;color:var(--text3);">Connexion à l\'API BOAMP</p></div>';
  
  try {
    let url;
    
    if (USE_LOCAL_PROXY) {
      // Utilise le proxy Python local
      const params = new URLSearchParams({
        search: searchTerm,
        dept: dept,
        min: min,
        max: max
      });
      url = LOCAL_API + '?' + params;
    } else {
      // Utilise le proxy public (peut ne pas fonctionner)
      let where = '(objet LIKE "%informatique%" OR objet LIKE "%IT%" OR objet LIKE "%cloud%")';
      if (searchTerm) {
        where = `(objet LIKE "%${searchTerm}%")`;
      }
      if (dept) {
        where += ` AND departement="${dept}"`;
      }
      const params = new URLSearchParams({
        where: where,
        limit: 100,
        timezone: 'Europe/Paris'
      });
      url = PROXY + encodeURIComponent(BOAMP_API + '?' + params);
    }
    
    console.log('Requête:', url);
    
    const response = await fetch(url);
    
    if (!response.ok) {
      throw new Error('HTTP ' + response.status);
    }
    
    const data = await response.json();
    
    console.log('Réponse:', data);
    
    if (USE_LOCAL_PROXY) {
      // Format du proxy local
      if (data.error) {
        throw new Error(data.message);
      }
      allAO = data.results || [];
    } else {
      // Format API directe
      if (!data.results || data.results.length === 0) {
        allAO = [];
      } else {
        allAO = data.results.map(rec => {
          let f = rec.fields || (rec.record && rec.record.fields) || rec;
          const budget = extractBudget(f);
          const deptCode = f.departement || '';
          const deptName = getDeptName(deptCode);
          
          return {
            id: f.idweb || (rec.record && rec.record.id) || rec.id || 'N/A',
            title: f.objet || 'Sans titre',
            client: f.denominationsociale || f.nomentite || f.denomination || 'Non spécifié',
            budget: budget,
            deadline: f.datelimitereponse || 'N/A',
            dept: deptCode,
            deptName: deptName,
            commune: f.commune || '',
            url: `https://www.boamp.fr/avis/detail/${f.idweb || (rec.record && rec.record.id) || rec.id || ''}`,
            source: 'BOAMP',
            publishDate: f.dateparution || ''
          };
        });
      }
    }
    
    if (allAO.length === 0) {
      container.innerHTML = '<div class="loading"><h3>Aucun AO trouvé</h3><p style="margin-top:12px;color:var(--text3);">Essayez d\'autres critères</p></div>';
      document.getElementById('tot').textContent = '0';
      document.getElementById('bud').textContent = '0 €';
      return;
    }
    
    
    displayed = 0;
    displayAO();
    updateStats(data.total_count || allAO.length);
    toast(`✓ ${allAO.length} AO trouvés`);
    
  } catch (error) {
    console.error('Erreur complète:', error);
    
    // Message spécifique si le proxy local n'est pas lancé
    if (USE_LOCAL_PROXY && (error.message.includes('Failed to fetch') || error.message.includes('NetworkError'))) {
      container.innerHTML = `<div class="loading">
        <h3>🚀 Lance le proxy Python</h3>
        <p style="margin-top:20px;color:var(--text2);font-size:15px;line-height:1.8;">
          <strong>Pour utiliser AOFinder :</strong>
        </p>
        <ol style="margin-top:16px;text-align:left;max-width:500px;margin-left:auto;margin-right:auto;color:var(--text2);line-height:2;">
          <li>Ouvre un terminal dans le dossier</li>
          <li>Lance : <code style="background:rgba(59,130,246,0.2);padding:4px 10px;border-radius:6px;color:var(--accent);">python proxy.py</code></li>
          <li>Ouvre : <code style="background:rgba(59,130,246,0.2);padding:4px 10px;border-radius:6px;color:var(--accent);">http://localhost:5000</code></li>
        </ol>
        <p style="margin-top:20px;color:var(--text3);font-size:13px;">
          Le proxy contourne le blocage CORS de l'API BOAMP
        </p>
      </div>`;
    } else {
      container.innerHTML = `<div class="loading">
        <h3>⚠️ Erreur de chargement</h3>
        <p style="margin-top:12px;color:var(--text3);">L'API BOAMP est temporairement indisponible</p>
        <p style="margin-top:8px;color:var(--text3);font-size:14px;">Détails: ${error.message}</p>
        <button class="btn" onclick="loadAO()" style="margin-top:20px;">Réessayer</button>
      </div>`;
    }
    toast('⚠️ ' + error.message);
  }
}
}

function extractBudget(fields) {
  const montant = fields.montant || fields.valeurestimee || fields.montantmarche || 0;
  if (typeof montant === 'string') {
    return parseInt(montant.replace(/[^0-9]/g, '')) || 0;
  }
  return parseInt(montant) || 0;
}

function getDeptName(code) {
  const depts = {
    '75':'Paris','67':'Bas-Rhin','68':'Haut-Rhin','69':'Rhône','13':'Bouches-du-Rhône',
    '59':'Nord','33':'Gironde','31':'Haute-Garonne','44':'Loire-Atlantique','06':'Alpes-Maritimes',
    '92':'Hauts-de-Seine','93':'Seine-Saint-Denis','94':'Val-de-Marne','91':'Essonne',
    '78':'Yvelines','77':'Seine-et-Marne','95':'Val-d\'Oise','38':'Isère','54':'Meurthe-et-Moselle',
    '34':'Hérault','35':'Ille-et-Vilaine','29':'Finistère','57':'Moselle','76':'Seine-Maritime'
  };
  return depts[code] || code;
}

function displayAO() {
  const container = document.getElementById('res');
  const search = document.getElementById('search').value.toLowerCase();
  const min = parseInt(document.getElementById('min').value) || 0;
  const max = parseInt(document.getElementById('max').value) || 999999999;
  
  let filtered = allAO.filter(ao => {
    if (search && !ao.title.toLowerCase().includes(search)) return false;
    if (ao.budget < min || ao.budget > max) return false;
    return true;
  });
  
  const toShow = filtered.slice(0, displayed + PER_PAGE);
  displayed += PER_PAGE;
  
  if (!toShow.length) {
    container.innerHTML = '<div style="text-align:center;padding:100px;color:#a1a1a6;"><div style="font-size:80px;margin-bottom:24px;opacity:0.3;">🔍</div><h2>Aucun AO</h2></div>';
    return;
  }
  
  let html = '<div class="ao-list">';
  toShow.forEach(ao => {
    const location = [ao.dept, ao.deptName, ao.commune].filter(x => x).join(' - ');
    
    html += `<div class="ao-card">
      <div class="ao-header">
        <div>
          <div class="ao-title">${ao.title}</div>
          <div class="ao-client">📍 ${ao.client}</div>
        </div>
        <div class="badge">📡 ${ao.source}</div>
      </div>
      <div class="ao-meta">
        <div class="meta-item"><div class="meta-label">Référence</div><div class="meta-value">${ao.id}</div></div>
        <div class="meta-item"><div class="meta-label">Budget</div><div class="meta-value">${ao.budget > 0 ? fmt(ao.budget) : 'N/C'}</div></div>
        <div class="meta-item"><div class="meta-label">Deadline</div><div class="meta-value">${fmtD(ao.deadline)}</div></div>
        <div class="meta-item"><div class="meta-label">Département</div><div class="meta-value">${location || 'France'}</div></div>
      </div>
      <a href="${ao.url}" target="_blank" class="ao-link">Voir l'annonce BOAMP <span>→</span></a>
    </div>`;
  });
  html += '</div>';
  
  if (displayed < filtered.length) {
    html += `<div class="load-more"><button class="btn" onclick="displayAO()">Charger plus (${filtered.length - displayed} restants)</button></div>`;
  }
  
  container.innerHTML = html;
  document.getElementById('tot').textContent = filtered.length.toLocaleString('fr-FR');
}

function updateStats(total) {
  document.getElementById('tot').textContent = total.toLocaleString('fr-FR');
  const totalBudget = allAO.reduce((sum, ao) => sum + ao.budget, 0);
  document.getElementById('bud').textContent = fmt(totalBudget);
  document.getElementById('rec').textContent = new Date().toLocaleDateString('fr-FR');
}

function debounceSearch() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    displayed = 0;
    displayAO();
  }, 500);
}

function reset() {
  document.getElementById('search').value = '';
  document.getElementById('min').value = '';
  document.getElementById('max').value = '';
  document.getElementById('region').value = '';
  loadAO();
}

function fmt(n) {
  return new Intl.NumberFormat('fr-FR', {style: 'currency', currency: 'EUR', maximumFractionDigits: 0}).format(n);
}

function fmtD(d) {
  if (!d || d === 'N/A') return 'N/A';
  try { return new Date(d).toLocaleDateString('fr-FR'); } catch { return d; }
}

function toast(m) {
  const t = document.getElementById('toast');
  t.textContent = m;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 4000);
}

window.onload = () => loadAO();
</script>
</body>
</html>
