<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --bg: #0a0e1a; --surface: #151b2e; --surface-light: #1e2740; --border: rgba(99, 179, 237, 0.15); --text: #e8f1ff; --text-dim: #94a9c9; --accent: #3b82f6; --success: #10b981; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
.container { max-width: 1400px; margin: 0 auto; padding: 24px; }
.header { background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(37, 99, 235, 0.05)); border: 1px solid var(--border); border-radius: 16px; padding: 32px; margin-bottom: 24px; text-align: center; }
.logo { font-size: 2.5em; font-weight: 800; background: linear-gradient(135deg, #3b82f6, #2563eb); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
.subtitle { color: var(--text-dim); font-size: 1.1em; margin-bottom: 8px; }
.sources { color: var(--text-dim); font-size: 0.9em; }
.filters { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 24px; }
.filter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px; margin-bottom: 16px; }
.filter-group label { display: block; font-size: 0.85em; font-weight: 600; color: var(--text-dim); margin-bottom: 6px; text-transform: uppercase; }
input, select { width: 100%; background: var(--surface-light); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 10px 12px; font-family: 'Inter', sans-serif; font-size: 0.95em; }
input:focus, select:focus { outline: none; border-color: var(--accent); }
input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { display: none; }
.btn { padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; font-size: 0.95em; transition: all 0.2s; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn-outline:hover { border-color: var(--accent); }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
.stat-value { font-size: 2em; font-weight: 800; color: var(--accent); }
.stat-label { font-size: 0.85em; color: var(--text-dim); text-transform: uppercase; }
.ao-list { display: flex; flex-direction: column; gap: 16px; }
.ao-card { background: var(--surface); border: 1px solid var(--border); border-left: 4px solid var(--accent); border-radius: 12px; padding: 20px; transition: all 0.3s; }
.ao-card:hover { transform: translateX(4px); box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3); }
.ao-header { display: flex; justify-content: space-between; margin-bottom: 16px; }
.ao-title { font-size: 1.2em; font-weight: 700; margin-bottom: 6px; }
.ao-client { color: var(--text-dim); font-size: 0.9em; }
.ao-badge { background: var(--success); color: white; padding: 6px 12px; border-radius: 20px; font-size: 0.85em; font-weight: 700; white-space: nowrap; height: fit-content; }
.ao-meta { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; padding: 16px; background: var(--surface-light); border-radius: 8px; margin-bottom: 12px; }
.meta-item { font-size: 0.9em; }
.meta-label { color: var(--text-dim); font-size: 0.75em; text-transform: uppercase; margin-bottom: 2px; }
.meta-value { font-weight: 600; }
.ao-desc { color: var(--text-dim); margin-bottom: 12px; line-height: 1.5; }
.ao-link { display: inline-block; color: var(--accent); text-decoration: none; font-weight: 600; font-size: 0.9em; }
.ao-link:hover { text-decoration: underline; }
.toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px 24px; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4); transform: translateY(100px); opacity: 0; transition: all 0.3s; z-index: 1000; }
.toast.show { transform: translateY(0); opacity: 1; }
</style>

var filt=[];
function applyFilters(){var s=document.getElementById('sector').value;var min=parseInt(document.getElementById('budgetMin').value)||0;var max=parseInt(document.getElementById('budgetMax').value)||999999999;var r=document.getElementById('region').value.toLowerCase();filt=DB.filter(function(a){if(s&&a.sector!==s)return false;if(a.budget<min||a.budget>max)return false;if(r&&!a.location.toLowerCase().includes(r.replace('-',' ')))return false;return true;});display();updateStats();}
function display(){var c=document.getElementById('results');if(!filt.length){c.innerHTML='<div style="text-align:center;padding:60px;color:#94a9c9;"><div style="font-size:4em;margin-bottom:16px;">🔍</div><h3>Aucun AO</h3></div>';return;}var h='<div class="ao-list">';filt.forEach(function(a){h+='<div class="ao-card"><div class="ao-header"><div><div class="ao-title">'+a.title+'</div><div class="ao-client">📍 '+a.client+'</div></div><div class="ao-badge">📡 '+a.source+'</div></div><div class="ao-meta"><div class="meta-item"><div class="meta-label">Ref</div><div class="meta-value">'+a.id+'</div></div><div class="meta-item"><div class="meta-label">Budget</div><div class="meta-value">'+fmt(a.budget)+'</div></div><div class="meta-item"><div class="meta-label">Deadline</div><div class="meta-value">'+fmtD(a.deadline)+'</div></div><div class="meta-item"><div class="meta-label">Lieu</div><div class="meta-value">'+a.location+'</div></div></div><div class="ao-desc">'+a.description+'</div><a href="'+a.url+'" target="_blank" class="ao-link">📄 Voir →</a></div>';});h+='</div>';c.innerHTML=h;}
function updateStats(){document.getElementById('statTotal').textContent=filt.length;document.getElementById('statBudget').textContent=fmt(filt.reduce(function(s,a){return s+a.budget;},0));var w=new Date();w.setDate(w.getDate()-7);document.getElementById('statRecent').textContent=filt.filter(function(a){return new Date(a.publishDate)>=w;}).length;}
function resetFilters(){document.getElementById('sector').value='';document.getElementById('budgetMin').value='';document.getElementById('budgetMax').value='';document.getElementById('region').value='';applyFilters();}
function fmt(n){return new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(n);}
function fmtD(d){return new Date(d).toLocaleDateString('fr-FR');}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},3000);}
window.onload=function(){applyFilters();toast('✅ 60 AO chargés automatiquement !');};
</script>
</body>
</html>
